services:
  - type: web
    name: beninpay
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_orders,write_orders,read_products,read_customers,write_checkouts,write_script_tags,read_script_tags
      - key: ADMIN_PASSWORD
        sync: false
      - key: SIMULATION_MODE
        value: "false"
