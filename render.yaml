services:
  - type: web
    name: beninpay-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: beninpay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: beninpay-redis
          type: redis
          property: connectionString
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_orders,write_orders,read_products,read_customers,write_checkouts
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SENTRY_DSN
        sync: false
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: beninpay-db
    plan: starter
    databaseName: beninpay
    postgresMajorVersion: "16"
