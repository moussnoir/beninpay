<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeninPay - Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --violet: #635bff;
  --violet-dark: #4f46e5;
  --violet-light: #7c77ff;
  --bg: #0a0a0a;
  --surface: #18181b;
  --border: #27272a;
  --text: #fafafa;
  --text-muted: #a1a1aa;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding: 0;
  margin: 0;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 48px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--violet), var(--violet-light));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.shop-info {
  display: flex;
  align-items: center;
  gap: 16px;
}

.shop-name {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 500;
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-icon {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-icon:hover {
  background: var(--border);
}

.btn-primary {
  background: var(--violet);
  color: white;
}

.btn-primary:hover {
  background: var(--violet-dark);
  transform: translateY(-1px);
}

/* Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 48px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  transition: all 0.2s;
}

.stat-card:hover {
  border-color: var(--violet);
  transform: translateY(-2px);
}

.stat-label {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.stat-value {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--text), var(--text-muted));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stat-value.highlight {
  background: linear-gradient(135deg, var(--violet), var(--violet-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stat-unit {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 500;
}

/* Section */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  margin-bottom: 24px;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.section-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Form */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.input-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.01em;
}

.input,
.select {
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  font-weight: 500;
}

.input:focus,
.select:focus {
  outline: none;
  border-color: var(--violet);
  box-shadow: 0 0 0 3px rgba(99, 91, 255, 0.1);
}

.input::placeholder {
  color: var(--text-muted);
}

/* Table */
.table-container {
  overflow-x: auto;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table thead {
  background: var(--bg);
}

.table th {
  padding: 14px 16px;
  text-align: left;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}

.table td {
  padding: 16px;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}

.table tbody tr {
  transition: background 0.2s;
}

.table tbody tr:hover {
  background: var(--bg);
}

.table tbody tr:last-child td {
  border-bottom: none;
}

/* Status Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.badge-pending {
  background: rgba(245, 158, 11, 0.1);
  color: var(--warning);
}

.badge-completed {
  background: rgba(16, 185, 129, 0.1);
  color: var(--success);
}

.badge-approved {
  background: rgba(99, 91, 255, 0.1);
  color: var(--violet-light);
}

.badge-rejected {
  background: rgba(239, 68, 68, 0.1);
  color: var(--error);
}

.badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* Alert */
.alert {
  padding: 16px 20px;
  border-radius: 8px;
  margin-bottom: 24px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid;
}

.alert-success {
  background: rgba(16, 185, 129, 0.1);
  border-color: var(--success);
  color: var(--success);
}

.alert-error {
  background: rgba(239, 68, 68, 0.1);
  border-color: var(--error);
  color: var(--error);
}

/* Empty State */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-text {
  font-size: 15px;
  font-weight: 500;
}

/* Loader */
.loader {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.spinner {
  display: inline-block;
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--violet);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Amount */
.amount {
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.amount-positive {
  color: var(--success);
}

/* Responsive */
@media (max-width: 768px) {
  .container {
    padding: 24px 16px;
  }

  .header {
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
  }

  .stats-grid {
    grid-template-columns: 1fr;
  }

  .form-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div>
      <div class="logo">
        <div class="logo-icon">💳</div>
        BeninPay
      </div>
      <div class="shop-name" id="shopName">Chargement...</div>
    </div>
    <div class="shop-info">
      <button class="btn btn-icon" onclick="location.reload()">
        <span>↻</span>
        Actualiser
      </button>
    </div>
  </div>

  <!-- Alerts -->
  <div id="alertContainer"></div>

  <!-- Stats Cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Solde Disponible</div>
      <div class="stat-value highlight" id="balance">—</div>
      <div class="stat-unit">FCFA</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Gagné</div>
      <div class="stat-value" id="totalEarned">—</div>
      <div class="stat-unit">FCFA</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Retiré</div>
      <div class="stat-value" id="totalWithdrawn">—</div>
      <div class="stat-unit">FCFA</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Transactions</div>
      <div class="stat-value" id="totalTransactions">—</div>
      <div class="stat-unit">Complétées</div>
    </div>
  </div>

  <!-- Withdrawal Form -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">💸 Demander un Retrait</div>
    </div>
    <form id="withdrawalForm">
      <div class="form-grid">
        <div class="input-group">
          <label class="input-label">Montant (FCFA)</label>
          <input type="number" class="input" id="amount" placeholder="10000" required min="100">
        </div>
        <div class="input-group">
          <label class="input-label">Opérateur Mobile Money</label>
          <select class="select" id="operator" required>
            <option value="">Sélectionner...</option>
            <option value="MTN">MTN Mobile Money</option>
            <option value="Moov">Moov Money</option>
            <option value="Celtis">Celtis Cash</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label">Numéro de Téléphone</label>
          <input type="tel" class="input" id="phone" placeholder="+229 97 12 34 56" required>
        </div>
        <div class="input-group" style="display:flex;align-items:flex-end;">
          <button type="submit" class="btn btn-primary" style="width:100%;">
            Soumettre la Demande
          </button>
        </div>
      </div>
    </form>
  </div>

  <!-- Withdrawals Table -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">📋 Historique des Retraits</div>
    </div>
    <div id="withdrawalsTable">
      <div class="loader">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- Transactions Table -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">💳 Transactions Récentes</div>
    </div>
    <div id="transactionsTable">
      <div class="loader">
        <div class="spinner"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = window.location.origin;
const urlParams = new URLSearchParams(window.location.search);
const shop = urlParams.get('shop') || 'demo.myshopify.com';

function showAlert(message, type = 'success') {
  const container = document.getElementById('alertContainer');
  const alert = document.createElement('div');
  alert.className = `alert alert-${type}`;
  alert.textContent = message;
  container.appendChild(alert);
  setTimeout(() => alert.remove(), 5000);
}

async function loadDashboard() {
  try {
    const res = await fetch(`${API_URL}/merchant/dashboard?shop=${shop}`);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    document.getElementById('shopName').textContent = data.merchant.shop_domain;
    document.getElementById('balance').textContent = (data.merchant.balance || 0).toLocaleString();
    document.getElementById('totalEarned').textContent = (data.merchant.total_earned || 0).toLocaleString();
    document.getElementById('totalWithdrawn').textContent = (data.merchant.total_withdrawn || 0).toLocaleString();
    document.getElementById('totalTransactions').textContent = data.stats.total_transactions || 0;

    displayWithdrawals(data.pending_withdrawals || []);
    displayTransactions(data.recent_transactions || []);

  } catch (error) {
    console.error('Erreur:', error);
    showAlert('Erreur de chargement: ' + error.message, 'error');
  }
}

function displayWithdrawals(withdrawals) {
  const container = document.getElementById('withdrawalsTable');

  if (withdrawals.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-text">Aucun retrait pour le moment</div>
      </div>
    `;
    return;
  }

  const html = `
    <div class="table-container">
      <table class="table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Montant</th>
            <th>Opérateur</th>
            <th>Numéro</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody>
          ${withdrawals.map(w => `
            <tr>
              <td>${new Date(w.requested_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
              <td><span class="amount">${w.amount.toLocaleString()} FCFA</span></td>
              <td>${w.mobile_money_operator}</td>
              <td>${w.mobile_money_number}</td>
              <td><span class="badge badge-${w.status}">${getStatusLabel(w.status)}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  container.innerHTML = html;
}

function displayTransactions(transactions) {
  const container = document.getElementById('transactionsTable');

  if (transactions.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">💳</div>
        <div class="empty-text">Aucune transaction pour le moment</div>
      </div>
    `;
    return;
  }

  const html = `
    <div class="table-container">
      <table class="table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Order ID</th>
            <th>Montant Total</th>
            <th>Frais</th>
            <th>Votre Part</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody>
          ${transactions.map(t => `
            <tr>
              <td>${new Date(t.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
              <td><span style="font-family: monospace;">#${t.order_id}</span></td>
              <td><span class="amount">${(t.amount || 0).toLocaleString()} FCFA</span></td>
              <td>${(t.beninpay_fee || 0).toLocaleString()} FCFA</td>
              <td><span class="amount amount-positive">${(t.merchant_amount || 0).toLocaleString()} FCFA</span></td>
              <td><span class="badge badge-${t.status}">${getStatusLabel(t.status)}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  container.innerHTML = html;
}

function getStatusLabel(status) {
  const labels = {
    'pending': 'En attente',
    'completed': 'Complété',
    'approved': 'Approuvé',
    'rejected': 'Rejeté'
  };
  return labels[status] || status;
}

document.getElementById('withdrawalForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const amount = parseInt(document.getElementById('amount').value);
  const operator = document.getElementById('operator').value;
  const phone = document.getElementById('phone').value;

  try {
    const res = await fetch(`${API_URL}/merchant/withdrawal/request?shop=${shop}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        amount,
        mobile_money_operator: operator,
        mobile_money_number: phone
      })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    showAlert(`✓ ${data.message}`, 'success');
    document.getElementById('withdrawalForm').reset();

    setTimeout(() => loadDashboard(), 1000);

  } catch (error) {
    console.error('Erreur:', error);
    showAlert('✗ Erreur: ' + error.message, 'error');
  }
});

loadDashboard();
setInterval(loadDashboard, 30000);
</script>

</body>
</html>
