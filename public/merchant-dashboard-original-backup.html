<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeninPay - Dashboard Marchand</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: linear-gradient(135deg, #00b389 0%, #ffd700 50%, #e8112d 100%);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.header {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  margin-bottom: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 32px;
  font-weight: 900;
  background: linear-gradient(135deg, #00b389, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.shop-name {
  font-size: 18px;
  color: #666;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.card-title {
  font-size: 14px;
  color: #888;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.card-value {
  font-size: 36px;
  font-weight: 700;
  color: #00b389;
  margin-bottom: 5px;
}

.card-sub {
  font-size: 13px;
  color: #aaa;
}

.section {
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  margin-bottom: 30px;
}

.section-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
  color: #333;
}

.withdrawal-form {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.input-group {
  display: flex;
  flex-direction: column;
}

.input-group label {
  font-size: 13px;
  color: #666;
  margin-bottom: 5px;
  font-weight: 600;
}

.input-group input,
.input-group select {
  padding: 12px 15px;
  border: 2px solid #eee;
  border-radius: 10px;
  font-size: 15px;
  font-family: 'Outfit', sans-serif;
  transition: all 0.3s;
}

.input-group input:focus,
.input-group select:focus {
  outline: none;
  border-color: #00b389;
}

.btn {
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Outfit', sans-serif;
}

.btn-primary {
  background: #00b389;
  color: white;
}

.btn-primary:hover {
  background: #009573;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,179,137,0.3);
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th {
  text-align: left;
  padding: 12px;
  background: #f8f9fa;
  font-weight: 600;
  color: #666;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.table td {
  padding: 15px 12px;
  border-bottom: 1px solid #f0f0f0;
  font-size: 14px;
}

.status {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.status-pending {
  background: #fff3cd;
  color: #856404;
}

.status-completed {
  background: #d4edda;
  color: #155724;
}

.status-rejected {
  background: #f8d7da;
  color: #721c24;
}

.status-approved {
  background: #d1ecf1;
  color: #0c5460;
}

.alert {
  padding: 15px 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-size: 14px;
}

.alert-success {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

.alert-error {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}

.loader {
  text-align: center;
  padding: 40px;
  font-size: 18px;
  color: #666;
}

.empty {
  text-align: center;
  padding: 40px;
  color: #aaa;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <div class="logo">BeninPay 🇧🇯</div>
      <div class="shop-name" id="shopName">Chargement...</div>
    </div>
    <div>
      <button class="btn btn-primary" onclick="location.reload()">🔄 Actualiser</button>
    </div>
  </div>

  <div id="alertContainer"></div>

  <div class="cards" id="statsCards">
    <div class="card">
      <div class="card-title">Solde Disponible</div>
      <div class="card-value" id="balance">-</div>
      <div class="card-sub">FCFA</div>
    </div>
    <div class="card">
      <div class="card-title">Total Gagné</div>
      <div class="card-value" id="totalEarned">-</div>
      <div class="card-sub">FCFA</div>
    </div>
    <div class="card">
      <div class="card-title">Total Retiré</div>
      <div class="card-value" id="totalWithdrawn">-</div>
      <div class="card-sub">FCFA</div>
    </div>
    <div class="card">
      <div class="card-title">Transactions</div>
      <div class="card-value" id="totalTransactions">-</div>
      <div class="card-sub">Complétées</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">💰 Demander un Retrait</div>
    <form id="withdrawalForm" class="withdrawal-form">
      <div class="input-group">
        <label>Montant (FCFA)</label>
        <input type="number" id="amount" placeholder="1000" required min="100">
      </div>
      <div class="input-group">
        <label>Opérateur</label>
        <select id="operator" required>
          <option value="">Choisir...</option>
          <option value="MTN">MTN Mobile Money</option>
          <option value="Moov">Moov Money</option>
          <option value="Celtis">Celtis Cash</option>
        </select>
      </div>
      <div class="input-group">
        <label>Numéro Mobile Money</label>
        <input type="tel" id="phone" placeholder="+22997123456" required>
      </div>
      <div class="input-group" style="display:flex;align-items:flex-end;">
        <button type="submit" class="btn btn-primary" style="width:100%;">Demander Retrait</button>
      </div>
    </form>
  </div>

  <div class="section">
    <div class="section-title">📋 Mes Retraits</div>
    <div id="withdrawalsTable">
      <div class="loader">Chargement des retraits...</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">💳 Dernières Transactions</div>
    <div id="transactionsTable">
      <div class="loader">Chargement des transactions...</div>
    </div>
  </div>
</div>

<script>
const API_URL = window.location.origin;

// Récupérer shop domain depuis URL
const urlParams = new URLSearchParams(window.location.search);
const shop = urlParams.get('shop') || 'demo.myshopify.com';

// Fonction pour afficher les alertes
function showAlert(message, type = 'success') {
  const container = document.getElementById('alertContainer');
  const alert = document.createElement('div');
  alert.className = `alert alert-${type}`;
  alert.textContent = message;
  container.appendChild(alert);

  setTimeout(() => alert.remove(), 5000);
}

// Charger le dashboard
async function loadDashboard() {
  try {
    const res = await fetch(`${API_URL}/merchant/dashboard?shop=${shop}`);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    // Mettre à jour les stats
    document.getElementById('shopName').textContent = data.merchant.shop_domain;
    document.getElementById('balance').textContent = (data.merchant.balance || 0).toLocaleString();
    document.getElementById('totalEarned').textContent = (data.merchant.total_earned || 0).toLocaleString();
    document.getElementById('totalWithdrawn').textContent = (data.merchant.total_withdrawn || 0).toLocaleString();
    document.getElementById('totalTransactions').textContent = data.stats.total_transactions || 0;

    // Afficher les retraits
    displayWithdrawals(data.pending_withdrawals || []);

    // Afficher les transactions
    displayTransactions(data.recent_transactions || []);

  } catch (error) {
    console.error('Erreur:', error);
    showAlert('Erreur de chargement: ' + error.message, 'error');
  }
}

// Afficher les retraits
function displayWithdrawals(withdrawals) {
  const container = document.getElementById('withdrawalsTable');

  if (withdrawals.length === 0) {
    container.innerHTML = '<div class="empty">Aucun retrait pour le moment</div>';
    return;
  }

  const html = `
    <table class="table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Montant</th>
          <th>Opérateur</th>
          <th>Numéro</th>
          <th>Statut</th>
        </tr>
      </thead>
      <tbody>
        ${withdrawals.map(w => `
          <tr>
            <td>${new Date(w.requested_at).toLocaleDateString('fr-FR')}</td>
            <td><strong>${w.amount.toLocaleString()} FCFA</strong></td>
            <td>${w.mobile_money_operator}</td>
            <td>${w.mobile_money_number}</td>
            <td><span class="status status-${w.status}">${w.status}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;

  container.innerHTML = html;
}

// Afficher les transactions
function displayTransactions(transactions) {
  const container = document.getElementById('transactionsTable');

  if (transactions.length === 0) {
    container.innerHTML = '<div class="empty">Aucune transaction pour le moment</div>';
    return;
  }

  const html = `
    <table class="table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Order ID</th>
          <th>Montant</th>
          <th>Frais</th>
          <th>Votre Part</th>
          <th>Statut</th>
        </tr>
      </thead>
      <tbody>
        ${transactions.map(t => `
          <tr>
            <td>${new Date(t.created_at).toLocaleDateString('fr-FR')}</td>
            <td>${t.order_id}</td>
            <td>${(t.amount || 0).toLocaleString()} FCFA</td>
            <td>${(t.beninpay_fee || 0).toLocaleString()} FCFA</td>
            <td><strong>${(t.merchant_amount || 0).toLocaleString()} FCFA</strong></td>
            <td><span class="status status-${t.status}">${t.status}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;

  container.innerHTML = html;
}

// Gérer la soumission du formulaire de retrait
document.getElementById('withdrawalForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const amount = parseInt(document.getElementById('amount').value);
  const operator = document.getElementById('operator').value;
  const phone = document.getElementById('phone').value;

  try {
    const res = await fetch(`${API_URL}/merchant/withdrawal/request?shop=${shop}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        amount,
        mobile_money_operator: operator,
        mobile_money_number: phone
      })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    showAlert(`✅ ${data.message}`, 'success');
    document.getElementById('withdrawalForm').reset();

    // Recharger le dashboard
    setTimeout(() => loadDashboard(), 1000);

  } catch (error) {
    console.error('Erreur:', error);
    showAlert('❌ Erreur: ' + error.message, 'error');
  }
});

// Charger au démarrage
loadDashboard();

// Actualiser toutes les 30 secondes
setInterval(loadDashboard, 30000);
</script>

</body>
</html>
